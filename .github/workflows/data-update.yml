name: Daily Property Data Update

on:
  schedule:
    - cron: '0 0 * * *' # 매일 00:00 UTC(한국 시간 09:00)에 실행
  workflow_dispatch:      # 수동 실행 버튼 추가

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리에 커밋/푸시하기 위한 권한
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run data fetch script
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }} # GitHub Secrets에 저장된 인증키 사용
        run: |
          python src/api/fetch_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add apt_data.csv
          # 변경 사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update property data: $(date +'%Y-%m-%d')" && git push)
